services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ocularis
      POSTGRES_PASSWORD: ocularis          # local dev only — override via env for production
      POSTGRES_DB: ocularis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocularis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
